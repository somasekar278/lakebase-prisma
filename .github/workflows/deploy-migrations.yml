# Deploy the same committed migration history to root first, then to each child.
# Uses `prisma migrate deploy` (non-interactive; safe for CI).
#
# Each job sets DATABASE_URL to a different secret so Prisma replays identical
# SQL from prisma/migrations/ against independent Postgres endpoints.
#
# migrate-child-1 and migrate-child-2 both `need: migrate-root` so root must pass
# before either child runs (they may run in parallel with each other).

name: Deploy — Prisma migrations (root then children)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Root must succeed before any child job runs.
  # ---------------------------------------------------------------------------
  migrate-root:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_ROOT }}
      # Required because schema declares shadowDatabaseUrl; migrate deploy does not use it.
      SHADOW_DATABASE_URL: ${{ secrets.DATABASE_URL_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Remove this step after P1010 is fixed. Logs user/host/db and password length only (no password text).
      - name: Debug DATABASE_URL shape (root only)
        run: |
          node <<'NODE'
          const raw = process.env.DATABASE_URL ?? '';
          const urlStr = raw.trim();
          let u;
          try {
            u = new URL(urlStr.replace(/^postgresql:/i, 'postgres:'));
          } catch (e) {
            console.error('DATABASE_URL failed to parse as URL:', e.message);
            process.exit(1);
          }
          console.log('scheme=', u.protocol);
          console.log('user=', u.username);
          console.log('host=', u.hostname);
          console.log('port=', u.port || '5432');
          console.log('database=', decodeURIComponent((u.pathname || '/').slice(1) || ''));
          console.log('has_schema_public=', /[?&]schema=public\b/i.test(u.search));
          console.log('has_sslmode_require=', /sslmode=require\b/i.test(u.search));
          console.log('password_char_length=', (u.password || '').length);
          NODE

      # Use npm script so we run project Prisma (v6). `npx prisma` can fetch Prisma 7+.
      - name: Apply migrations (root)
        run: npm run db:migrate:deploy

  migrate-child-1:
    needs: migrate-root
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_1 }}
      SHADOW_DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_1 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations (child 1)
        run: npm run db:migrate:deploy

  migrate-child-2:
    needs: migrate-root
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_2 }}
      SHADOW_DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_2 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations (child 2)
        run: npm run db:migrate:deploy
