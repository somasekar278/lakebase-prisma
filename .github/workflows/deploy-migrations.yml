# Deploy the same committed migration history to root first, then to each child.
# Uses `prisma migrate deploy` (non-interactive; safe for CI).
#
# Each job sets DATABASE_URL to a different secret so Prisma replays identical
# SQL from prisma/migrations/ against independent Postgres endpoints.
#
# migrate-child-1 and migrate-child-2 both `need: migrate-root` so root must pass
# before either child runs (they may run in parallel with each other).

name: Deploy — Prisma migrations (root then children)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Root must succeed before any child job runs.
  # ---------------------------------------------------------------------------
  migrate-root:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_ROOT }}
      # Required because schema declares shadowDatabaseUrl; migrate deploy does not use it.
      SHADOW_DATABASE_URL: ${{ secrets.DATABASE_URL_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Job env already sets DATABASE_URL from secrets.DATABASE_URL_ROOT (not secrets.DATABASE_URL).
      # Redacts password; prints decoded password length; psql strips ?schema= (libpq rejects it).
      - name: Diagnose URL + connectivity (root only)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client python3
          python3 <<'PY'
          import os, subprocess, sys, urllib.parse as up
          raw = (os.environ.get("DATABASE_URL") or "").strip()
          if not raw:
              print("DATABASE_URL empty", file=sys.stderr)
              sys.exit(1)
          u = raw.replace("postgresql://", "postgres://", 1) if raw.lower().startswith("postgresql://") else raw
          p = up.urlparse(u)
          user = up.unquote(p.username) or ""
          pw = up.unquote(p.password) or ""
          host = p.hostname or ""
          port = p.port or "5432"
          db = up.unquote((p.path or "/").lstrip("/") or "")
          qs = ("?" + p.query) if p.query else ""
          print("DATABASE_URL (redacted):", f"postgresql://{user}:***@{host}:{port}/{db}" + qs)
          print("Password length (decoded):", len(pw))
          print("--- psql (schema= stripped from query string for libpq) ---")
          q = [(k, v) for k, v in up.parse_qsl(p.query, keep_blank_values=True) if k.lower() != "schema"]
          newq = up.urlencode(q)
          clean = up.urlunparse((p.scheme, p.netloc, p.path, p.params, newq, p.fragment))
          clean = clean.replace("postgres://", "postgresql://", 1)
          r = subprocess.run(
              ["psql", clean, "-v", "ON_ERROR_STOP=1", "-c", "select current_user, current_database(), inet_server_addr();"],
              capture_output=True,
              text=True,
          )
          print(r.stdout)
          print(r.stderr, file=sys.stderr)
          sys.exit(r.returncode)
          PY

      # Use npm script so we run project Prisma (v6). `npx prisma` can fetch Prisma 7+.
      - name: Apply migrations (root)
        run: npm run db:migrate:deploy

  migrate-child-1:
    needs: migrate-root
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_1 }}
      SHADOW_DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_1 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations (child 1)
        run: npm run db:migrate:deploy

  migrate-child-2:
    needs: migrate-root
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_2 }}
      SHADOW_DATABASE_URL: ${{ secrets.DATABASE_URL_CHILD_2 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations (child 2)
        run: npm run db:migrate:deploy
